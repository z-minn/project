<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文件分享中心</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --accent: #4f6ef7;
      --accent-light: #eef1ff;
      --text-primary: #1a202c;
      --text-secondary: #718096;
      --border: #e2e8f0;
      --shadow: 0 4px 20px rgba(79, 110, 247, 0.10);
      --shadow-hover: 0 8px 32px rgba(79, 110, 247, 0.22);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: linear-gradient(135deg, #4f6ef7 0%, #7b5ea7 100%);
      padding: 56px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
      pointer-events: none;
    }
    .header-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    header p {
      color: rgba(255,255,255,0.78);
      font-size: 1rem;
    }

    /* ── Main ────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── File Grid ───────────────────────────── */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .file-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 24px 20px 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .file-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #4f6ef7, #7b5ea7);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .file-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }
    .file-card:hover::before { opacity: 1; }

    .file-icon-wrap {
      width: 52px;
      height: 52px;
      background: var(--accent-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .file-icon-wrap svg {
      width: 28px;
      height: 28px;
    }

    .file-info { flex: 1; }
    .file-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .file-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .file-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .file-size {
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 0.75rem;
    }
    .open-hint {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      font-weight: 500;
      font-size: 0.78rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .file-card:hover .open-hint { opacity: 1; }

    /* ── Empty State ────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 0.95rem; line-height: 1.7; }
    .empty-state code {
      background: #f7f8fa;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.88em;
    }

    /* ── Footer ─────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 480px) {
      header h1 { font-size: 1.5rem; }
      .file-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <span class="header-icon">📂</span>
  <h1>文件分享中心</h1>
  <p>点击文件即可在新标签页中预览</p>
</header>

<main>
  <div class="section-title">📄 共享文档</div>

    -->

    <a class="file-card" href="your-file-1.pdf" target="_blank" rel="noopener">
      <div class="file-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="14 2 14 8 20 8" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

      </div>

    </a>

    <a class="file-card" href="your-file-2.pdf" target="_blank" rel="noopener">
      <div class="file-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

          <polyline points="14 2 14 8 20 8" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="16" y1="13" x2="8" y2="13" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="16" y1="17" x2="8" y2="17" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round"/>

      </div>
      <div class="file-meta">
        <span class="file-size">3.4 MB</span>

    <a class="file-card" href="your-file-3.pdf" target="_blank" rel="noopener">
      <div class="file-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="14 2 14 8 20 8" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="16" y1="13" x2="8" y2="13" stroke="#4f6ef7" stroke-width="1.8" stroke-linecap="round"/>

      <div class="file-info">

    </a>

  </div>
</main>

<footer>
